name: build-connector

# 乘风连接器·云端构建（无需本机装 Rust/Windows，push 即出包）
#
# 产物（在 Actions run 页 → Artifacts 下载）：
#   - macOS 通用包（同时支持 Apple Silicon M 芯片 + Intel）→ .dmg
#   - Windows x64 安装包 → .exe（NSIS 安装器）
#
# 触发：push 到 main/master，或 Actions 页手动「Run workflow」
# 注意：frpc 版本须与专机 frps 对齐（当前钉 0.69.1；专机换版本须同步改下方 FRP_VER）

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  FRP_VER: "0.69.1"

jobs:
  build-macos:
    name: macOS 通用包 (Apple Silicon + Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 装 Rust（含 arm64 + x86_64 双 target，用于 universal）
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 装 tauri-cli（binstall 预编译，秒装）
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli --version "^2.0" -y

      - name: 拉取 frpc 并合成 universal（lipo arm64+amd64）
        run: |
          mkdir -p resources/bin
          for arch in darwin_arm64 darwin_amd64; do
            curl -L "https://github.com/fatedier/frp/releases/download/v${FRP_VER}/frp_${FRP_VER}_${arch}.tar.gz" \
              -o /tmp/frp_${arch}.tgz
            tar -xzf /tmp/frp_${arch}.tgz -C /tmp "frp_${FRP_VER}_${arch}/frpc"
          done
          lipo -create \
            /tmp/frp_${FRP_VER}_darwin_arm64/frpc \
            /tmp/frp_${FRP_VER}_darwin_amd64/frpc \
            -output resources/bin/frpc
          chmod +x resources/bin/frpc
          echo "=== frpc 架构校验 ===" && file resources/bin/frpc

      - name: 构建（universal-apple-darwin，一个 dmg 同时支持 M/Intel）
        run: cargo tauri build --target universal-apple-darwin

      - name: 上传 dmg
        uses: actions/upload-artifact@v4
        with:
          name: chengfeng-connector-macos-universal
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows x64 安装包
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 装 tauri-cli（binstall 预编译，秒装）
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli --version "^2.0" -y

      - name: 拉取 frpc.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/bin | Out-Null
          Invoke-WebRequest `
            "https://github.com/fatedier/frp/releases/download/v${env:FRP_VER}/frp_${env:FRP_VER}_windows_amd64.zip" `
            -OutFile frp.zip
          Expand-Archive -Path frp.zip -DestinationPath frpwin -Force
          Copy-Item "frpwin/frp_${env:FRP_VER}_windows_amd64/frpc.exe" "resources/bin/frpc.exe"
          Write-Host "=== frpc.exe 校验 ==="
          Get-Item resources/bin/frpc.exe | Format-List Name,Length

      - name: 构建（NSIS 安装器 .exe；避开 WiX/msi 依赖）
        run: cargo tauri build --bundles nsis

      - name: 上传 exe 安装包
        uses: actions/upload-artifact@v4
        with:
          name: chengfeng-connector-windows-x64
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
